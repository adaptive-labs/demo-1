version: "1.0.1"

metadata:
  name: create-github-repo
  displayName: Create Empty GitHub Repo - TEST
  description: Creates a new GitHub repository with minimal configuration
  author: shoehorn
  icon: git-branch
  category: repository
  tags:
    - github
    - repository
    - starter

inputs:
  type: object
  required:
    - name
    - owner
  properties:
    name:
      type: string
      title: Repository Name
      description: Name of the GitHub repository to create
    owner:
      type: string
      title: Owner
      description: GitHub organization or user
    private:
      type: boolean
      title: Private Repository
      description: Whether the repository should be private
      default: true
    description:
      type: string
      title: Repository Description
      description: Description for the GitHub repository
      default: "Created by Shoehorn Forge"
    auto_init:
      type: boolean
      title: Initialize with README
      description: Whether to initialize the repository with a README file
      default: false

actions:
  - action: github.repo.create
    label: Create Repository
    description: Creates a new empty GitHub repository with minimal configuration
    primary: true

steps:
  - id: create-repo
    name: Create GitHub Repository
    action: github.repo.create
    inputs:
      name: "${{ inputs.name }}"
      owner: "${{ inputs.owner }}"
      private: "${{ inputs.private }}"
      description: "${{ inputs.description }}"
      auto_init: "${{ inputs.auto_init }}"

output:
  links:
    - title: Repository
      url: "${{ steps.create-repo.output.html_url }}"
