version: "1.0.0"

metadata:
  name: action-test-github-delete
  displayName: Action Test - GitHub Delete
  description: Creates a disposable repository and deletes it in the same run.
  author: shoehorn
  icon: trash-2
  category: testing
  tags:
    - forge
    - action-test
    - github
    - destructive

inputs:
  type: object
  required:
    - owner
    - name
  properties:
    owner:
      type: string
      title: Repository Owner
      description: Provider-qualified owner or organization, for example github.com/adaptive-labs.

    name:
      type: string
      title: Disposable Repository Name
      description: Must start with action-test-delete-. The repository is deleted by this run.
      pattern: "^action-test-delete-[a-z0-9-]+$"
      minLength: 20
      maxLength: 63
      ui:options:
        placeholder: action-test-delete-smoke

    private:
      type: boolean
      title: Private Repository

defaults:
  name: action-test-delete-smoke
  private: true

actions:
  - action: action.test.github.delete
    label: Test GitHub Delete Action
    description: Creates and deletes a disposable repository.
    primary: true

steps:
  - id: create-disposable-repo
    name: Create disposable repository
    action: github.repo.create
    inputs:
      owner: "${{ inputs.owner }}"
      name: "${{ inputs.name }}"
      description: "Disposable repository for github.repo.delete action testing"
      private: "${{ inputs.private }}"
      auto_init: true

  - id: delete-disposable-repo
    name: Delete disposable repository
    action: github.repo.delete
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
