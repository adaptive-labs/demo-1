version: "2.0.4"

metadata:
  name: scaffold-go-service-test-v1
  displayName: Scaffold Go Service Test V1
  description: Create a GitHub repository with a Go HTTP service, Dockerfile, CI pipeline, and optional catalog registration
  author: shoehorn
  icon: server
  category: service
  tags:
    - golang
    - http
    - microservice
    - docker

inputs:
  type: object
  required:
    - name
    - owner
  properties:
    name:
      type: string
      title: Service Name
      description: Lowercase with hyphens, used as repo name and service ID
      pattern: "^[a-z][a-z0-9-]*$"
      minLength: 2
      maxLength: 63
      ui:options:
        placeholder: my-service

    owner:
      type: string
      title: Repository Owner
      description: Provider-qualified owner or workspace from Forge integration settings

    description:
      type: string
      title: Description
      description: Short description of the service
      ui:options:
        placeholder: A Go HTTP service that...

    goVersion:
      type: string
      title: Go Version
      enum:
        - "1.26"

    port:
      type: string
      title: HTTP Port
      pattern: "^[0-9]+$"
      ui:options:
        placeholder: "8080"

    private:
      type: boolean
      title: Private Repository

    enableCI:
      type: boolean
      title: Enable GitHub Actions CI

    registerCatalog:
      type: boolean
      title: Register in Shoehorn Catalog
      x-dependency:
        condition: name != null

    team:
      type: string
      title: Owning Team (catalog)
      description: Team slug for catalog ownership
      x-dependency:
        condition: registerCatalog == true
      ui:options:
        source: catalog:teams
        placeholder: Select a team

    users:
      type: string
      title: Stakeholder
      description: Assigned Stakeholder
      x-dependency:
        condition: registerCatalog == true
      ui:options:
        source: catalog:users
        placeholder: Select a user

defaults:
  goVersion: "1.26"
  port: "8080"
  private: true
  enableCI: false
  registerCatalog: false

actions:
  - action: scaffold.go.service
    label: Scaffold Go Service
    description: Creates a Go HTTP service repository with all scaffolding
    primary: true

steps:
  - id: create-repo
    name: Create GitHub repository
    action: github.repo.create
    inputs:
      name: "${{ inputs.name }}"
      owner: "${{ inputs.owner }}"
      description: "${{ inputs.description }}"
      private: "${{ inputs.private }}"
      auto_init: true
      delete_branch_on_merge: true
      allow_squash_merge: true
      allow_merge_commit: false
      allow_rebase_merge: false
      custom_properties:
        created-by: "${{ context.createdBy }}"
        managed-by: "shoehorn"

  - id: add-service-files
    name: Add service skeleton files
    action: github.template.apply
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      source_path: ./skeleton
      message: "feat: add service skeleton"
      template_values: &goServiceTemplateValues
        serviceName: "${{ inputs.name }}"
        goVersion: "${{ inputs.goVersion }}"
        httpPort: "${{ inputs.port }}"
        description: "${{ inputs.description }}"
        owner: "${{ inputs.team }}"
        serviceVersion: "0.1.0"
        buildId: "${{ context.runId }}"
      include:
        - cmd/**
        - internal/**
        - go.mod.tmpl
        - go.sum.tmpl
        - Dockerfile.tmpl
        - Makefile.tmpl
        - README.md.tmpl
        - deployments/**
        - .gitignore.tmpl

  - id: add-ci
    name: Add GitHub Actions CI
    action: github.file.create
    if: "${{ inputs.enableCI }}"
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: .github/workflows/ci.yaml
      message: "ci: add GitHub Actions workflow"
      template_path: ./skeleton/.github/workflows/build.yml.tmpl
      template_values: *goServiceTemplateValues

  - id: set-topics
    name: Set repository topics
    action: github.topics.set
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      topics:
        - golang
        - http-service
        - microservice
        - shoehorn-managed
        - docker

  - id: register-entity
    name: Register in Shoehorn catalog
    action: catalog.entity.register
    if: "${{ inputs.registerCatalog }}"
    inputs:
      service_id: "${{ inputs.name }}"
      name: "${{ inputs.name }}"
      type: service
      description: "${{ inputs.description }}"
      lifecycle: experimental
      owner: "${{ inputs.team }}"
      tags:
        - golang
        - shoehorn-managed
      links:
        - name: GitHub
          url: "${{ steps.create-repo.output.html_url }}"
          icon: GitHub

output:
  links:
    - title: Repository
      url: "${{ steps.create-repo.output.html_url }}"
