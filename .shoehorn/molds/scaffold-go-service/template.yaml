version: "2.0.2"

metadata:
  name: scaffold-go-service-test-v1
  displayName: Scaffold Go Service Test V1
  description: Create a GitHub repository with a Go HTTP service, Dockerfile, CI pipeline, and optional catalog registration
  author: shoehorn
  icon: server
  category: service
  tags:
    - golang
    - http
    - microservice
    - docker

inputs:
  type: object
  required:
    - name
    - owner
  properties:
    name:
      type: string
      title: Service Name
      description: Lowercase with hyphens, used as repo name and service ID
      pattern: "^[a-z][a-z0-9-]*$"
      minLength: 2
      maxLength: 63
      ui:options:
        placeholder: my-service

    owner:
      type: string
      title: GitHub Organization
      description: GitHub org where the repo will be created

    description:
      type: string
      title: Description
      description: Short description of the service
      ui:options:
        placeholder: A Go HTTP service that...

    goVersion:
      type: string
      title: Go Version
      enum:
        - "1.23"
        - "1.24"
        - "1.25"

    port:
      type: string
      title: HTTP Port
      pattern: "^[0-9]+$"
      ui:options:
        placeholder: "8080"

    private:
      type: boolean
      title: Private Repository

    enableCI:
      type: boolean
      title: Enable GitHub Actions CI

    registerCatalog:
      type: boolean
      title: Register in Shoehorn Catalog
      x-dependency:
        condition: name != null

    team:
      type: string
      title: Owning Team (catalog)
      description: Team slug for catalog ownership
      x-dependency:
        condition: registerCatalog == true
      ui:options:
        source: catalog:teams
        placeholder: platform-team

defaults:
  goVersion: "1.24"
  port: "8080"
  private: true
  enableCI: true
  registerCatalog: false

actions:
  - action: scaffold.go.service
    label: Scaffold Go Service
    description: Creates a Go HTTP service repository with all scaffolding
    primary: true

steps:
  - id: create-repo
    name: Create GitHub repository
    action: github.repo.create
    inputs:
      name: "${{ inputs.name }}"
      owner: "${{ inputs.owner }}"
      description: "${{ inputs.description }}"
      private: "${{ inputs.private }}"
      auto_init: true
      delete_branch_on_merge: true
      allow_squash_merge: true
      allow_merge_commit: false
      allow_rebase_merge: false
      custom_properties:
        created-by: "${{ context.createdBy }}"
        managed-by: "shoehorn"

  - id: add-main
    name: Add main.go
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: cmd/${{ inputs.name }}/main.go
      message: "feat: add main.go"
      template_path: ./skeleton/cmd/service/main.go.tmpl
      template_values: &goServiceTemplateValues
        serviceName: "${{ inputs.name }}"
        modulePath: "github.com/${{ inputs.owner }}/${{ inputs.name }}"
        goVersion: "${{ inputs.goVersion }}"
        httpPort: "${{ inputs.port }}"
        description: "${{ inputs.description }}"
        owner: "${{ inputs.team }}"
        Steps:
          generate_service_metadata:
            Outputs:
              serviceType: service
              serviceVersion: "0.1.0"
              createdAt: "${{ context.runId }}"

  - id: add-config
    name: Add config package
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: internal/config/config.go
      message: "feat: add config package"
      template_path: ./skeleton/internal/config/config.go.tmpl
      template_values: *goServiceTemplateValues

  - id: add-server
    name: Add HTTP server package
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: internal/server/server.go
      message: "feat: add HTTP server package"
      template_path: ./skeleton/internal/server/server.go.tmpl
      template_values: *goServiceTemplateValues

  - id: add-gomod
    name: Add go.mod
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: go.mod
      message: "feat: add go.mod"
      template_path: ./skeleton/go.mod.tmpl
      template_values: *goServiceTemplateValues

  - id: add-gosum
    name: Add go.sum
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: go.sum
      message: "feat: add go.sum"
      template_path: ./skeleton/go.sum.tmpl
      template_values: *goServiceTemplateValues

  - id: add-dockerfile
    name: Add Dockerfile
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: Dockerfile
      message: "feat: add Dockerfile"
      template_path: ./skeleton/Dockerfile.tmpl
      template_values: *goServiceTemplateValues

  - id: add-makefile
    name: Add Makefile
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: Makefile
      message: "build: add Makefile"
      template_path: ./skeleton/Makefile.tmpl
      template_values: *goServiceTemplateValues

  - id: add-gitignore
    name: Add .gitignore
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: .gitignore
      message: "chore: add .gitignore"
      template_path: ./skeleton/.gitignore.tmpl

  - id: add-readme
    name: Add README
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: README.md
      message: "docs: add README"
      template_path: ./skeleton/README.md.tmpl
      template_values: *goServiceTemplateValues

  - id: add-k8s-deployment
    name: Add Kubernetes deployment
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: deployments/k8s/deployment.yaml
      message: "deploy: add Kubernetes deployment"
      template_path: ./skeleton/deployments/k8s/deployment.yaml.tmpl
      template_values: *goServiceTemplateValues

  - id: add-ci
    name: Add GitHub Actions CI
    action: github.file.create
    if: "${{ inputs.enableCI }}"
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: .github/workflows/ci.yaml
      message: "ci: add GitHub Actions workflow"
      template_path: ./skeleton/.github/workflows/build.yaml.tmpl
      template_values: *goServiceTemplateValues

  - id: set-topics
    name: Set repository topics
    action: github.topics.set
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      topics:
        - golang
        - http-service
        - microservice
        - shoehorn-managed
        - docker

  - id: register-entity
    name: Register in Shoehorn catalog
    action: catalog.entity.register
    if: "${{ inputs.registerCatalog }}"
    inputs:
      service_id: "${{ inputs.name }}"
      name: "${{ inputs.name }}"
      type: service
      description: "${{ inputs.description }}"
      lifecycle: experimental
      owner: "${{ inputs.team }}"
      tags:
        - golang
        - shoehorn-managed
      links:
        - name: GitHub
          url: "${{ steps.create-repo.output.html_url }}"
          icon: GitHub

output:
  links:
    - title: Repository
      url: "${{ steps.create-repo.output.html_url }}"
