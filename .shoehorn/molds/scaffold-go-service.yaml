version: "1.0.0"

metadata:
  name: scaffold-go-service-test-v1
  displayName: Scaffold Go Service Test V1
  description: Create a GitHub repository with a Go HTTP service, Dockerfile, CI pipeline, and optional catalog registration
  author: shoehorn
  icon: server
  category: service
  tags:
    - golang
    - http
    - microservice
    - docker

inputs:
  type: object
  required:
    - name
    - owner
  properties:
    name:
      type: string
      title: Service Name
      description: Lowercase with hyphens, used as repo name and service ID
      pattern: "^[a-z][a-z0-9-]*$"
      minLength: 2
      maxLength: 63
      ui:options:
        placeholder: my-service

    owner:
      type: string
      title: GitHub Organization
      description: GitHub org where the repo will be created

    description:
      type: string
      title: Description
      description: Short description of the service
      ui:options:
        placeholder: A Go HTTP service that...

    goVersion:
      type: string
      title: Go Version
      enum:
        - "1.23"
        - "1.24"
        - "1.25"

    port:
      type: string
      title: HTTP Port
      pattern: "^[0-9]+$"
      ui:options:
        placeholder: "8080"

    private:
      type: boolean
      title: Private Repository

    enableCI:
      type: boolean
      title: Enable GitHub Actions CI

    registerCatalog:
      type: boolean
      title: Register in Shoehorn Catalog
      x-dependency:
        condition: name != null

    team:
      type: string
      title: Owning Team (catalog)
      description: Team slug for catalog ownership
      x-dependency:
        condition: registerCatalog == true
      ui:options:
        placeholder: platform-team

defaults:
  goVersion: "1.24"
  port: "8080"
  private: true
  enableCI: true
  registerCatalog: false

actions:
  - action: scaffold.go.service
    label: Scaffold Go Service
    description: Creates a Go HTTP service repository with all scaffolding
    primary: true

steps:
  # Step 1: Create the repository
  - id: create-repo
    name: Create GitHub repository
    action: github.repo.create
    inputs:
      name: "${{ inputs.name }}"
      owner: "${{ inputs.owner }}"
      description: "${{ inputs.description }}"
      private: "${{ inputs.private }}"
      auto_init: false
      delete_branch_on_merge: true
      allow_squash_merge: true
      allow_merge_commit: false
      allow_rebase_merge: false
      custom_properties:
        created-by: "${{ context.createdBy }}"
        managed-by: "shoehorn"

  # Step 2: Add main.go
  - id: add-main
    name: Add main.go
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: main.go
      message: "feat: add main.go"
      content: |
        package main

        import (
        	"fmt"
        	"log"
        	"net/http"
        	"os"
        )

        func main() {
        	port := os.Getenv("PORT")
        	if port == "" {
        		port = "${{ inputs.port }}"
        	}

        	http.HandleFunc("/health", func(w http.ResponseWriter, r *http.Request) {
        		w.Header().Set("Content-Type", "application/json")
        		fmt.Fprintf(w, `{"status":"healthy","service":"${{ inputs.name }}"}`)
        	})

        	http.HandleFunc("/", func(w http.ResponseWriter, r *http.Request) {
        		fmt.Fprintf(w, "Hello from ${{ inputs.name }}")
        	})

        	log.Printf("Starting ${{ inputs.name }} on :%s", port)
        	log.Fatal(http.ListenAndServe(":"+port, nil))
        }

  # Step 3: Add go.mod
  - id: add-gomod
    name: Add go.mod
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: go.mod
      message: "feat: add go.mod"
      content: |
        module github.com/${{ inputs.owner }}/${{ inputs.name }}

        go ${{ inputs.goVersion }}

  # Step 4: Add Dockerfile
  - id: add-dockerfile
    name: Add Dockerfile
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: Dockerfile
      message: "feat: add Dockerfile"
      content: |
        FROM golang:${{ inputs.goVersion }}-alpine AS builder
        WORKDIR /app
        COPY go.mod ./
        COPY *.go ./
        RUN CGO_ENABLED=0 GOOS=linux go build -o /${{ inputs.name }} .

        FROM gcr.io/distroless/static-debian12:nonroot
        COPY --from=builder /${{ inputs.name }} /
        EXPOSE ${{ inputs.port }}
        USER nonroot:nonroot
        ENTRYPOINT ["/${{ inputs.name }}"]

  # Step 5: Add .gitignore
  - id: add-gitignore
    name: Add .gitignore
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: .gitignore
      message: "chore: add .gitignore"
      content: |
        # Binaries
        *.exe
        *.exe~
        *.dll
        *.so
        *.dylib
        /${{ inputs.name }}

        # Test
        *.test
        *.out
        coverage.out

        # IDE
        .idea/
        .vscode/
        *.swp

        # OS
        .DS_Store
        Thumbs.db

  # Step 6: Add README
  - id: add-readme
    name: Add README
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: README.md
      message: "docs: add README"
      content: |
        # ${{ inputs.name }}

        ${{ inputs.description }}

        Created by ${{ context.createdBy }} via [Shoehorn Forge](https://shoehorn.dev).

        ## Development

        ```bash
        go run main.go
        ```

        ## Docker

        ```bash
        docker build -t ${{ inputs.name }} .
        docker run -p ${{ inputs.port }}:${{ inputs.port }} ${{ inputs.name }}
        ```

        ## Health check

        ```bash
        curl http://localhost:${{ inputs.port }}/health
        ```

  # Step 7: Add CI pipeline (conditional)
  - id: add-ci
    name: Add GitHub Actions CI
    action: github.file.create
    if: "${{ inputs.enableCI }}"
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: .github/workflows/ci.yaml
      message: "ci: add GitHub Actions workflow"
      content: |
        name: CI
        on:
          push:
            branches: [main]
          pull_request:
            branches: [main]
        jobs:
          build:
            runs-on: ubuntu-latest
            steps:
              - uses: actions/checkout@v4
              - uses: actions/setup-go@v5
                with:
                  go-version: "${{ inputs.goVersion }}"
              - run: go build ./...
              - run: go test -race ./...
              - run: go vet ./...

  # Step 8: Set topics
  - id: set-topics
    name: Set repository topics
    action: github.topics.set
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      topics:
        - golang
        - http-service
        - microservice
        - shoehorn-managed
        - docker

  # Step 9: Register in catalog (conditional)
  - id: register-entity
    name: Register in Shoehorn catalog
    action: catalog.entity.register
    if: "${{ inputs.registerCatalog }}"
    inputs:
      service_id: "${{ inputs.name }}"
      name: "${{ inputs.name }}"
      type: service
      description: "${{ inputs.description }}"
      lifecycle: experimental
      owner: "${{ inputs.team }}"
      tags:
        - golang
        - shoehorn-managed
      links:
        - name: GitHub
          url: "${{ steps.create-repo.output.html_url }}"
          icon: GitHub

output:
  links:
    - title: Repository
      url: "${{ steps.create-repo.output.html_url }}"
