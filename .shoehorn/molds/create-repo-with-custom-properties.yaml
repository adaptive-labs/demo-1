version: "1.0.0"

metadata:
  name: create-repo-with-custom-properties
  displayName: Create Repo with Custom Properties
  description: Creates a GitHub repository with custom properties, topics, license, merge settings, and a README
  author: shoehorn
  icon: settings
  category: repository
  tags:
    - github
    - repository
    - custom-properties
    - advanced

inputs:
  type: object
  required:
    - name
    - owner
  properties:
    name:
      type: string
      title: Repository Name
      description: Name of the GitHub repository to create
    owner:
      type: string
      title: Owner
      description: GitHub organization or user
    language:
      type: string
      title: Language
      description: Primary programming language
      enum:
        - go
        - typescript
        - python
        - rust
        - java
      default: go
    topics:
      type: string
      title: Topics
      description: Comma-separated list of repository topics
      default: "shoehorn,internal"
    license:
      type: string
      title: License
      description: License template to use
      enum:
        - mit
        - apache-2.0
        - gpl-3.0
        - none
      default: mit
    private:
      type: boolean
      title: Private Repository
      default: true
    delete_branch_on_merge:
      type: boolean
      title: Delete branch on merge
      description: Automatically delete head branches after PR merge
      default: true
    allow_squash_merge:
      type: boolean
      title: Allow squash merge
      default: true
    allow_merge_commit:
      type: boolean
      title: Allow merge commit
      default: true
    allow_rebase_merge:
      type: boolean
      title: Allow rebase merge
      default: false
    team_slug:
      type: string
      title: Team
      description: GitHub team slug to grant push access (optional)
    register_in_catalog:
      type: boolean
      title: Register in catalog
      description: Create an entity in the Shoehorn catalog for this repository
      default: true

actions:
  - action: github.repo.create
    label: Create Repository with Properties
    description: Creates a GitHub repository with custom properties, merge settings, topics, and a README
    primary: true

steps:
  - id: create-repo
    name: Create GitHub Repository
    action: github.repo.create
    inputs:
      name: "${{ inputs.name }}"
      owner: "${{ inputs.owner }}"
      private: "${{ inputs.private }}"
      description: "A ${{ inputs.language }} project created by Shoehorn Forge"
      auto_init: true
      license_template: "${{ inputs.license }}"
      delete_branch_on_merge: "${{ inputs.delete_branch_on_merge }}"
      allow_squash_merge: "${{ inputs.allow_squash_merge }}"
      allow_merge_commit: "${{ inputs.allow_merge_commit }}"
      allow_rebase_merge: "${{ inputs.allow_rebase_merge }}"
      custom_properties:
        created-by: "${{ context.createdBy }}"
        language: "${{ inputs.language }}"

  - id: set-topics
    name: Set Repository Topics
    action: github.topics.set
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      topics: "${{ inputs.topics }}"

  - id: create-readme
    name: Create README
    action: github.file.create
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      path: "README.md"
      message: "docs: add project README"
      content: |
        # ${{ inputs.name }}

        A ${{ inputs.language }} project managed by Shoehorn.

        ## Getting Started

        TODO: Add setup instructions.

        ## License

        ${{ inputs.license }}

  - id: add-team
    name: Add team to repository
    action: github.team.add
    if: "${{ inputs.team_slug }}"
    inputs:
      owner: "${{ inputs.owner }}"
      repo: "${{ inputs.name }}"
      team_slug: "${{ inputs.team_slug }}"
      permission: push

  - id: register-entity
    name: Register in Shoehorn catalog
    if: "${{ inputs.register_in_catalog }}"
    action: catalog.entity.register
    inputs:
      service_id: "${{ inputs.name }}"
      name: "${{ inputs.name }}"
      type: service
      description: "A ${{ inputs.language }} project created by Shoehorn Forge"
      lifecycle: experimental
      owner: "${{ inputs.team_slug }}"
      tags:
        - "${{ inputs.language }}"
        - shoehorn-managed
      links:
        - name: GitHub
          url: "${{ steps.create-repo.output.html_url }}"
          icon: GitHub

output:
  links:
    - title: Repository
      url: "${{ steps.create-repo.output.html_url }}"
